name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter the YouTube video URL'
        required: true
      quality:
        description: 'Enter the desired quality (e.g. 720p, 1080p, best)'
        required: true

jobs:
  youtube_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install yt-dlp
        run: |
          pip install -U yt-dlp

      - name: Download Video
        run: |
          yt-dlp -f "${{ github.event.inputs.quality }}" "${{ github.event.inputs.url }}"
