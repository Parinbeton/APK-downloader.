name: Pull Docker Image and Save to Repository

on:
  workflow_dispatch:  # اجرای دستی
    inputs:
      docker_image:
        description: 'Docker image name (e.g., kutovoys/xray-checker:latest)'
        required: true
        default: 'kutovoys/xray-checker:latest'
      image_tag:
        description: 'Tag for the saved file (optional)'
        required: false
        default: 'latest'

permissions:
  contents: write  # اجازه نوشتن در ریپازیتوری

jobs:
  pull-and-save:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Create docker directory if not exists
      run: |
        mkdir -p docker
        echo "✅ Docker directory is ready"
      
    - name: Pull Docker image
      run: |
        echo "📥 Pulling image: ${{ github.event.inputs.docker_image }}"
        docker pull ${{ github.event.inputs.docker_image }}
      
    - name: Save Docker image to tar file
      run: |
        # استخراج نام ایمج بدون tag برای نام فایل
        IMAGE_NAME=$(echo "${{ github.event.inputs.docker_image }}" | cut -d':' -f1 | sed 's/\//_/g')
        TAG_NAME=$(echo "${{ github.event.inputs.docker_image }}" | cut -d':' -f2)
        
        if [ "$TAG_NAME" = "${{ github.event.inputs.docker_image }}" ]; then
          TAG_NAME="${{ github.event.inputs.image_tag }}"
        fi
        
        OUTPUT_FILE="docker/${IMAGE_NAME}_${TAG_NAME}.tar"
        
        echo "💾 Saving image to: $OUTPUT_FILE"
        docker save -o "$OUTPUT_FILE" ${{ github.event.inputs.docker_image }}
        
        # فشرده‌سازی برای کاهش حجم
        gzip "$OUTPUT_FILE"
        echo "✅ Compressed: ${OUTPUT_FILE}.gz"
        
        # ذخیره نام فایل برای commit
        echo "OUTPUT_FILE=${OUTPUT_FILE}.gz" >> $GITHUB_ENV
      
    - name: Commit and push the docker image file
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # اضافه کردن فایل به git
        git add docker/*.tar.gz
        
        # اگر تغییری وجود داشت، commit کن
        if git diff --staged --quiet; then
          echo "📝 No changes to commit"
        else
          git commit -m "Add Docker image: ${{ github.event.inputs.docker_image }} [skip ci]"
          git push
          echo "✅ Docker image saved and pushed to repository"
        fi
      
    - name: Show saved files
      run: |
        echo "📁 Files saved in docker directory:"
        ls -lh docker/
