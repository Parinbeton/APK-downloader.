name: Pull Docker Image and Save as Artifact

on:
  workflow_dispatch:  # اجرای دستی از طریق GitHub UI
    inputs:
      image_tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
      output_filename:
        description: 'Output filename (default: xray-checker.tar)'
        required: false
        default: 'xray-checker.tar'

jobs:
  pull-and-save:
    runs-on: ubuntu-latest  # استفاده از Ubuntu (سبک‌تر و سریع‌تر)
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Pull Docker image
      run: |
        docker pull kutovoys/xray-checker:${{ github.event.inputs.image_tag }}
        
    - name: Save Docker image to tar file
      run: |
        docker save -o ${{ github.event.inputs.output_filename }} \
          kutovoys/xray-checker:${{ github.event.inputs.image_tag }}
        
    - name: Compress tar file (optional, for faster download)
      run: |
        gzip ${{ github.event.inputs.output_filename }}
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: xray-checker-image
        path: ${{ github.event.inputs.output_filename }}.gz
        retention-days: 7  # فایل به مدت 7 روز در GitHub نگهداری می‌شود
        if-no-files-found: error
