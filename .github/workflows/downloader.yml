name: Build Universal APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: ''

jobs:
  build-universal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract package name
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT

      - name: Checkout gplay downloader
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            gplay/.venv
            gplay/APKEditor.jar
            ~/.gplay-auth.json
          key: gplay-${{ runner.os }}-v7

      - name: Setup environment
        run: |
          cd gplay
          sudo apt-get update -qq && sudo apt-get install -y -qq apksigner openjdk-17-jre-headless
          if [ ! -d ".venv" ]; then
            chmod +x setup.sh && sudo ./setup.sh
          fi
          if [ ! -f ~/.gplay-auth.json ]; then
            ./gplay auth
          fi

      - name: Download and Build Universal APK
        run: |
          # ایجاد مسیرهای کاری
          mkdir -p apks downloads/arm64 downloads/armv7 merged
          
          cd gplay
          
          # دانلود هر دو معماری
          echo "Downloading ARM64..."
          ./gplay download "${{ steps.extract.outputs.package }}" -a arm64 -o ../downloads/arm64 || true
          
          echo "Downloading ARMv7..."
          ./gplay download "${{ steps.extract.outputs.package }}" -a armv7 -o ../downloads/armv7 || true
          
          cd ..
          
          # جمع‌آوری همه splitهای منحصربه‌فرد
          echo "Collecting splits..."
          cp downloads/arm64/*.apk merged/ 2>/dev/null || true
          cp downloads/armv7/*.apk merged/ 2>/dev/null || true
          
          # حذف duplicateها
          rm -f merged/*config.armeabi-v7a* merged/*config.arm64-v8a*
          cp downloads/arm64/*config.arm64* merged/ 2>/dev/null || true
          cp downloads/armv7/*config.armeabi* merged/ 2>/dev/null || true
          
          echo "Files to merge:"
          ls -la merged/
          
          # ادغام
          echo "Merging..."
          java -jar gplay/APKEditor.jar m -i merged/ -o apks/universal.apk
          
          if [ -f apks/universal.apk ]; then
            mv apks/universal.apk "apks/${{ steps.extract.outputs.package }}-UNIVERSAL.apk"
            echo "✅ Success: apks/${{ steps.extract.outputs.package }}-UNIVERSAL.apk"
            ls -lh apks/
          else
            echo "⚠️ Merge failed, creating ZIP..."
            zip -r "apks/${{ steps.extract.outputs.package }}-splits.zip" merged/
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "🌍 Universal APK: ${{ steps.extract.outputs.package }}" || echo "Nothing to commit"
          git push
