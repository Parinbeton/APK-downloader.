name: Web Browser with GUI

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه وب'
        required: true
        default: 'https://www.google.com'
        type: string

jobs:
  browse_with_gui:
    runs-on: ubuntu-latest
    steps:
      - name: چک‌اوت پروژه (در صورت 필요)
        uses: actions/checkout@v3

      - name: نصب Xvfb و مرورگر (کروم)
        run: |
          sudo apt update
          sudo apt install -y xvfb google-chrome-stable

      - name: نصب Node.js و Playwright
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: نصب Playwright و مرورگرها
        run: |
          npm install -D playwright
          npx playwright install

      - name: اجرای Xvfb
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          
      - name: اجرای اسکریپت مرورگر
        run: |
          echo "
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: false });
            const context = await browser.newContext({ viewport: { width: 1280, height: 720 } });
            const page = await context.newPage();
            await page.goto('${{ github.event.inputs.url }}', { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'screenshot.png' });
            await browser.close();
          })();
          " > ./browse.js

          node ./browse.js

      - name: آپلود اسکرین‌شات
        uses: actions/upload-artifact@v3
        with:
          name: screenshot
          path: screenshot.png
