name: Download APK for ARMv7/Arm64

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: ''
      arch:
        description: 'معماری پردازنده گوشی'
        required: true
        type: choice
        options:
          - arm64 (گوشی‌های جدید)
          - armv7 (گوشی‌های قدیمی)
        default: 'arm64 (گوشی‌های جدید)'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: my-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract details
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          # تبدیل انتخاب کاربر به فرمت قابل استفاده
          ARCH_INPUT="${{ github.event.inputs.arch }}"
          if [[ "$ARCH_INPUT" == *"arm64"* ]]; then
            ARCH="arm64"
          else
            ARCH="armv7"
          fi
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
          echo "Target: $PACKAGE for $ARCH"

      - name: Checkout gplay downloader
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay

      - name: Cache gplay dependencies
        uses: actions/cache@v4
        with:
          path: |
            gplay/.venv
            gplay/APKEditor.jar
            ~/.gplay-auth.json
          key: gplay-${{ runner.os }}-v3

      - name: Setup
        run: |
          cd gplay
          sudo apt-get update -qq && sudo apt-get install -y -qq apksigner openjdk-17-jre-headless
          if [ ! -d ".venv" ]; then
            chmod +x setup.sh && sudo ./setup.sh
          fi

      - name: Authenticate
        run: |
          cd gplay
          if [ ! -f ~/.gplay-auth.json ]; then
            ./gplay auth
          fi

      - name: Download Correct Architecture
        run: |
          cd gplay
          mkdir -p ../my-repo/apks
          
          echo "Downloading for ${{ steps.extract.outputs.arch }}..."
          ./gplay download "${{ steps.extract.outputs.package }}" \
            -a ${{ steps.extract.outputs.arch }} \
            -o ../my-repo/apks
          
          echo "Files:"
          ls -lah ../my-repo/apks/

      - name: Commit and Push
        run: |
          cd my-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "📱 ${{ steps.extract.outputs.package }} (ARMv7)" || echo "No changes"
          git push
