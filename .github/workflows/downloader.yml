name: Build Single Installable APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: 'https://play.google.com/store/apps/details?id=com.orbvpn.android'
      arch:
        description: 'معماری پردازنده گوشی'
        required: true
        type: choice
        options:
          - arm64 (گوشی‌های جدید)
          - armv7 (گوشی‌های قدیمی)
        default: 'arm64 (گوشی‌های جدید)'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract details
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          ARCH_INPUT="${{ github.event.inputs.arch }}"
          if [[ "$ARCH_INPUT" == *"arm64"* ]]; then
            ARCH="arm64-v8a"
          else
            ARCH="armeabi-v7a"
          fi
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
          echo "Target: $PACKAGE for $ARCH"

      - name: Checkout gplay downloader
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            gplay/.venv
            gplay/APKEditor.jar
            ~/.gplay-auth.json
            ~/bundletool.jar
          key: gplay-${{ runner.os }}-v4

      - name: Setup tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq apksigner openjdk-17-jre-headless wget
          
          # نصب gplay
          cd gplay
          if [ ! -d ".venv" ]; then
            chmod +x setup.sh && sudo ./setup.sh
          fi
          
          # نصب bundletool (ابزار رسمی گوگل)
          if [ ! -f ~/bundletool.jar ]; then
            wget -q https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -O ~/bundletool.jar
          fi

      - name: Authenticate
        run: |
          cd gplay
          if [ ! -f ~/.gplay-auth.json ]; then
            ./gplay auth
          fi

      - name: Download and Build Single APK
        run: |
          cd gplay
          WORK_DIR="../build"
          mkdir -p $WORK_DIR/apks $WORK_DIR/output
          
          # دانلود split APKها
          echo "Downloading..."
          ./gplay download "${{ steps.extract.outputs.package }}" \
            -a ${{ steps.extract.outputs.arch }} \
            -o $WORK_DIR/apks
          
          echo "Downloaded files:"
          ls -la $WORK_DIR/apks/
          
          # اگر فقط یک APK است، همه چیز آماده است
          cd $WORK_DIR
          APK_COUNT=$(ls apks/*.apk 2>/dev/null | wc -l)
          
          if [ $APK_COUNT -eq 1 ]; then
            echo "Single APK - no conversion needed"
            cp apks/*.apk output/
          else
            echo "Converting $APK_COUNT split APKs to single APK..."
            
            # Stage 1: Build APK Set از split APKها
            java -jar ~/bundletool.jar build-apks \
              --bundle=/dev/null \
              --output=temp.apks \
              --mode=universal \
              --ks=/dev/null \
              --ks-pass=pass:0000 \
              --overwrite \
              --existing-apks=$PWD/apks \
              2>/dev/null || true
              
            # Stage 2: Extract Universal APK از APK Set
            java -jar ~/bundletool.jar extract-apks \
              --apks=temp.apks \
              --output-dir=extracted \
              --device-spec=device.json 2>/dev/null || true
              
            # روش ساده‌تر: استفاده از APKEditor برای merge بدون تغییر امضا
            echo "Merging with APKEditor..."
            java -jar ../gplay/APKEditor.jar m \
              -i apks/ \
              -o output/merged.apk 2>/dev/null || true
              
            if [ -f output/merged.apk ]; then
              mv output/merged.apk "output/${{ steps.extract.outputs.package }}-${{ steps.extract.outputs.arch }}.apk"
              echo "Created single APK!"
            fi
          fi
          
          # کپی نتیجه به ریپازیتوری
          mkdir -p ../apks
          cp output/*.apk ../apks/ 2>/dev/null || cp apks/*.apk ../apks/
          
          echo "Final APK:"
          ls -la ../apks/

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "📱 ${{ steps.extract.outputs.package }} (Single APK)" || echo "No changes"
          git push
