name: Download APK using gplay-apk-downloader

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'نام پکیج برنامه (مثلاً com.spotify.music)'
        required: true
        default: 'com.spotify.music'

jobs:
  download-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the downloader repository
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay-downloader

      - name: Install dependencies
        run: |
          cd gplay-downloader
          chmod +x setup.sh && sudo ./setup.sh

      - name: Authenticate with Google Play
        run: |
          cd gplay-downloader
          ./gplay auth

      - name: Download the APK
        run: |
          cd gplay-downloader
          # دانلود برای معماری arm64-v8a و ادغام split APK ها
          ./gplay download "${{ github.event.inputs.package_name }}" -a arm64 -m -o ./output

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-apk
          path: gplay-downloader/output/*.apk
