name: Web Browser with GUI

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه وب'
        required: true
        default: 'https://www.google.com'
        type: string

jobs:
  gui_browsing:
    runs-on: ubuntu-latest

    steps:
      - name: چک‌اوت کد (در صورت نیاز)
        uses: actions/checkout@v3

      - name: نصب Xvfb و Chrome
        run: |
          sudo apt update
          sudo apt install -y xvfb google-chrome-stable

      - name: نصب Node.js و Playwright
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: نصب Playwright و مرورگرها
        run: |
          npm install -D playwright
          npx playwright install

      - name: اجرای Xvfb (رابط گرافیکی مجازی)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &             # اجرای Xvfb در پس‌زمینه
          echo "export DISPLAY=:99" >> $GITHUB_ENV     # تنظیم DISPLAY برای اسکریپت بعدی

      - name: اجرای اسکریپت مرورگر
        env:
          DISPLAY: :99
        run: |
          # نوشتن اسکریپت Node.js برای بازدید از URL و عکسبرداری
cat <<EOF > ./browse.js
const { chromium } = require('playwright');

(async () => {
  const browser = await chromium.launch({ headless: false });
  const context = await browser.newContext({ viewport: { width: 1280, height: 720 } } });
  const page = await context.newPage();
  await page.goto('${{ github.event.inputs.url }}', { waitUntil: 'networkidle' });
  await page.screenshot({ path: 'screenshot.png' });
  await browser.close();
})();
EOF
          # اجرای اسکریپت
          node ./browse.js

      - name: آپلود اسکرین‌شات
        uses: actions/upload-artifact@v3
        with:
          name: screenshot
          path: screenshot.png
