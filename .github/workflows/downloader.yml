name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس ویدئوی یوتیوب را وارد کنید'
        required: true
      quality:
        description: 'کیفیت مورد نظر را وارد کنید (مثال: 720p, 1080p, best)'
        required: true
        default: 'best' # کیفیت پیش‌فرض در صورت عدم ورود

jobs:
  youtube_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # استفاده از نسخه جدیدتر checkout

      - name: Set up Python
        uses: actions/setup-python@v4 # استفاده از نسخه جدیدتر setup-python
        with:
          python-version: '3.9' # یا نسخه پایتون مورد نظر شما

      - name: Install yt-dlp
        run: |
          python -m pip install -U yt-dlp
        shell: bash # تعیین صریح shell

      - name: Download YouTube Video
        run: |
          echo "Downloading video from: ${{ github.event.inputs.url }}"
          echo "Desired quality: ${{ github.event.inputs.quality }}"
          yt-dlp -f "${{ github.event.inputs.quality }}" "${{ github.event.inputs.url }}"
        shell: bash # تعیین صریح shell

      # اضافه کردن یک مرحله برای ذخیره فایل دانلود شده (اختیاری)
      # اگر می‌خواهید فایل دانلود شده را نگه دارید، این بخش را فعال کنید
