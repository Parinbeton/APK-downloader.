name: Simple APK Downloader

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          
          mkdir -p apks
          
          # مستقیم از APKCombo
          wget -q "https://apkcombo.com/checkin" --post-data="id=$PACKAGE" -O /tmp/info.json
          DL_URL=$(jq -r '.url' /tmp/info.json)
          
          if [ "$DL_URL" != "null" ] && [ -n "$DL_URL" ]; then
            wget -O "apks/$PACKAGE.apk" "$DL_URL"
            echo "✅ Downloaded successfully"
          else
            echo "❌ Failed to get download URL"
            cat /tmp/info.json
          fi

      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add apks/
          git commit -m "Add APK" || true
          git push
