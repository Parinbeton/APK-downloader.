name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yt-dlp
        run: sudo apt-get install -y yt-dlp

      - name: Extract URLs and download videos
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-youtube:'; then
            URL_LINE=$(echo "$MSG" | grep -oP 'download-youtube:\s*\K.*')
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Downloading YouTube videos"
          mkdir -p downloads

          for URL in $URL_LINE; do
            FILENAME=$(yt-dlp --get-filename -o "%(title)s.%(ext)s" "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"

            yt-dlp -o "downloads/${FILENAME}" "$URL" || exit 1
          done

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded videos from commit [skip ci]" || echo "Nothing to commit"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin HEAD:$BRANCH
