name: Download Original APK Files

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: my-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Package Name
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "Target: $PACKAGE"

      - name: Checkout gplay downloader
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay

      - name: Cache gplay dependencies
        uses: actions/cache@v4
        with:
          path: |
            gplay/.venv
            gplay/APKEditor.jar
            ~/.gplay-auth.json
          key: gplay-${{ runner.os }}-v2

      - name: Setup
        run: |
          cd gplay
          sudo apt-get update -qq && sudo apt-get install -y -qq apksigner openjdk-17-jre-headless
          if [ ! -d ".venv" ]; then
            chmod +x setup.sh && sudo ./setup.sh
          fi

      - name: Authenticate
        run: |
          cd gplay
          if [ ! -f ~/.gplay-auth.json ]; then
            ./gplay auth
          fi

      - name: Download APKs (NO MERGE)
        run: |
          cd gplay
          mkdir -p ../my-repo/apks
          
          echo "Downloading without merge (original files)..."
          # حذف پرچم -m یعنی بدون ادغام
          ./gplay download "${{ steps.extract.outputs.package }}" -a arm64 -o ../my-repo/apks
          
          echo "----------------------------------------"
          echo "Files downloaded:"
          ls -lah ../my-repo/apks/
          
          # اگر فقط یک APK هست، همون فایل نصبی اصلیه
          APK_COUNT=$(ls ../my-repo/apks/*.apk 2>/dev/null | wc -l)
          echo "Total APK files: $APK_COUNT"

      - name: Commit and Push
        run: |
          cd my-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "📱 Original APK: ${{ steps.extract.outputs.package }}" || echo "No changes"
          git push
