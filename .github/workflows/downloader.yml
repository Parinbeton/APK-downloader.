name: Fast APK Downloader & Commit

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: ''

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: my-repo

      - name: Extract Package Name
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "Target: $PACKAGE"

      - name: Checkout gplay-downloader
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            gplay/.venv
            gplay/APKEditor.jar
            ~/.android
            ~/.gplay-auth.json
          key: gplay-${{ runner.os }}-${{ hashFiles('gplay/setup.sh') }}

      - name: Setup gplay
        run: |
          cd gplay
          sudo apt-get update -qq && sudo apt-get install -y -qq apksigner openjdk-17-jre-headless
          if [ ! -d ".venv" ]; then
            chmod +x setup.sh && sudo ./setup.sh
          fi

      - name: Auth and Download
        id: download
        run: |
          cd gplay
          # احراز هویت فقط اگر فایل توکن موجود نباشد
          if [ ! -f ~/.gplay-auth.json ]; then
            ./gplay auth
          fi
          
          # ایجاد پوشه خروجی در ریپازیتوری اصلی
          mkdir -p ../my-repo/apks
          
          # دانلود APK
          ./gplay download "${{ steps.extract.outputs.package }}" -a arm64 -m -o ../my-repo/apks
          
          # نمایش فایل دانلود شده
          echo "Files in apks folder:"
          ls -la ../my-repo/apks/
          
          # ثبت مسیر فایل برای مرحله بعد
          APK_FILE=$(ls ../my-repo/apks/*.apk 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "apk_found=true" >> $GITHUB_OUTPUT
            echo "Downloaded: $APK_FILE"
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            echo "WARNING: No APK found!"
          fi

      - name: Commit and Push APK
        if: steps.download.outputs.apk_found == 'true'
        run: |
          cd my-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "📱 Add ${{ steps.extract.outputs.package }} APK" || echo "No changes"
          git push
