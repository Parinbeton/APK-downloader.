name: Download APK from Google Play Link

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: 'https://play.google.com/store/apps/details?id=com.spotify.music'

jobs:
  download-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Package Name from URL
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE_NAME=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Package Name: $PACKAGE_NAME"

      - name: Checkout the downloader repository
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay-downloader

      - name: Install prerequisites and setup project
        run: |
          # نصب apksigner که پیش‌نیاز ضروری است
          sudo apt-get update -qq && sudo apt-get install -y apksigner
          # حالا اسکریپت نصب اصلی پروژه را اجرا می‌کنیم
          cd gplay-downloader
          chmod +x setup.sh && sudo ./setup.sh

      - name: Authenticate with Google Play
        run: |
          cd gplay-downloader
          ./gplay auth

      - name: Download the APK
        run: |
          cd gplay-downloader
          ./gplay download "${{ steps.extract.outputs.package_name }}" -a arm64 -m -o ./output

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-apk
          path: gplay-downloader/output/*.apk
