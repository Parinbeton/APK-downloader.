name: Build Universal APK for All Devices

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: ''

jobs:
  build-universal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract package name
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "Target: $PACKAGE"

      - name: Checkout gplay downloader
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay

      - name: Cache everything
        uses: actions/cache@v4
        with:
          path: |
            gplay/.venv
            gplay/APKEditor.jar
            ~/.gplay-auth.json
            ~/.gplay-auth-armv7.json
          key: gplay-universal-${{ runner.os }}-v1

      - name: Setup tools
        run: |
          cd gplay
          sudo apt-get update -qq && sudo apt-get install -y -qq apksigner openjdk-17-jre-headless
          if [ ! -d ".venv" ]; then
            chmod +x setup.sh && sudo ./setup.sh
          fi

      - name: Authenticate for both architectures
        run: |
          cd gplay
          # احراز هویت برای ARM64
          if [ ! -f ~/.gplay-auth.json ]; then
            echo "Getting ARM64 token..."
            ./gplay auth
          fi
          # احراز هویت برای ARMv7
          if [ ! -f ~/.gplay-auth-armv7.json ]; then
            echo "Getting ARMv7 token..."
            ./gplay auth -a armv7
          fi

      - name: Download all architectures
        run: |
          cd gplay
          WORK_DIR="../universal_build"
          mkdir -p $WORK_DIR/{arm64,armv7,all_splits,universal}
          
          echo "════════════════════════════════════════"
          echo "📥 Downloading ARM64 version..."
          ./gplay download "${{ steps.extract.outputs.package }}" \
            -a arm64 \
            -o $WORK_DIR/arm64 2>&1 | grep -E "Download|Error|APK" || true
          
          echo ""
          echo "📥 Downloading ARMv7 version..."
          ./gplay download "${{ steps.extract.outputs.package }}" \
            -a armv7 \
            -o $WORK_DIR/armv7 2>&1 | grep -E "Download|Error|APK" || true
          
          echo ""
          echo "Downloaded files:"
          echo "--- ARM64 ---"
          ls -la $WORK_DIR/arm64/ 2>/dev/null || echo "No ARM64 files"
          echo "--- ARMv7 ---"
          ls -la $WORK_DIR/armv7/ 2>/dev/null || echo "No ARMv7 files"

      - name: Build Universal APK
        run: |
          WORK_DIR="universal_build"
          cd $WORK_DIR
          
          # جمع‌آوری همه splitهای منحصربه‌فرد
          echo "Collecting all unique splits..."
          
          # 1. Base APK (از ARM64 - کاملتر است)
          BASE_APK=$(ls arm64/*.apk 2>/dev/null | grep -v "config\." | head -1)
          if [ -z "$BASE_APK" ]; then
            BASE_APK=$(ls armv7/*.apk 2>/dev/null | grep -v "config\." | head -1)
          fi
          
          if [ -z "$BASE_APK" ]; then
            echo "❌ No base APK found!"
            exit 1
          fi
          
          cp "$BASE_APK" all_splits/
          echo "Base APK: $(basename $BASE_APK)"
          
          # 2. Config splits - هر دو معماری
          for arch_dir in arm64 armv7; do
            for apk in $arch_dir/config.*.apk; do
              if [ -f "$apk" ]; then
                APK_NAME=$(basename "$apk")
                
                # نگه داشتن همه معماری‌ها
                if echo "$APK_NAME" | grep -qE "config\.(arm64|armeabi)"; then
                  if [ ! -f "all_splits/$APK_NAME" ]; then
                    cp "$apk" all_splits/
                    echo "Arch split: $APK_NAME"
                  fi
                fi
                
                # نگه داشتن زبان‌ها و DPIها (همه)
                if echo "$APK_NAME" | grep -qE "config\.(en|fa|ar|es|fr|de|zh|xxhdpi|mdpi|xhdpi|hdpi|tvdpi)"; then
                  if [ ! -f "all_splits/$APK_NAME" ]; then
                    cp "$apk" all_splits/
                    echo "Resource split: $APK_NAME"
                  fi
                fi
              fi
            done
          done
          
          echo ""
          echo "Total unique splits: $(ls all_splits/ | wc -l)"
          
          # 3. ادغام به APK یونیورسال
          echo ""
          echo "🔄 Merging into Universal APK..."
          java -jar ../gplay/APKEditor.jar m \
            -i all_splits/ \
            -o universal/universal.apk 2>&1 | tail -3
          
          if [ -f universal/universal.apk ]; then
            # نام‌گذاری نهایی
            FINAL_NAME="${{ steps.extract.outputs.package }}-UNIVERSAL.apk"
            cp universal/universal.apk "../apks/$FINAL_NAME"
            
            SIZE=$(stat -c%s "../apks/$FINAL_NAME")
            echo ""
            echo "════════════════════════════════════════"
            echo "✅ Universal APK Created Successfully!"
            echo "📦 File: $FINAL_NAME"
            echo "📏 Size: $(echo "scale=1; $SIZE/1024/1024" | bc) MB"
            echo "📱 Compatible with: ARMv7, ARM64, x86"
            echo "════════════════════════════════════════"
          else
            echo "❌ Merge failed!"
            # Fallback: ZIP کردن همه splitها
            zip -r "../apks/${{ steps.extract.outputs.package }}-SPLITS.zip" all_splits/
            echo "Fallback: Created split package"
          fi
          
          # نمایش خروجی نهایی
          echo ""
          echo "Final output:"
          ls -lh ../apks/

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "🌍 Universal APK: ${{ steps.extract.outputs.package }}" || echo "No changes"
          git push
          echo "✅ Committed to repository!"
