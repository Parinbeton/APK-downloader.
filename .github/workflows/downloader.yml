name: Download Original APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: 'https://play.google.com/store/apps/details?id=com.spotify.music'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK from APKPure
        run: |
          # فقط wget و jq نیاز است (از قبل نصب هستند)
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          
          echo "📱 Package: $PACKAGE"
          
          # ساخت پوشه
          mkdir -p apks
          
          # روش ۱: APKPure (قابل اعتماد و همیشه در دسترس)
          echo "🔄 Trying APKPure..."
          
          # دریافت اطلاعات نسخه
          API_INFO="https://apkpure.com/api/package/info?package=$PACKAGE"
          VERSION=$(curl -s "$API_INFO" | jq -r '.data.version_code // empty')
          
          if [ -n "$VERSION" ]; then
            echo "Found version: $VERSION"
            
            # ساخت لینک دانلود APKPure
            DOWNLOAD_URL="https://d.apkpure.com/b/APK/${PACKAGE}?versionCode=${VERSION}"
            
            echo "Downloading..."
            wget -q --show-progress \
              -O "apks/${PACKAGE}-${VERSION}.apk" \
              "$DOWNLOAD_URL"
            
            # بررسی سلامت فایل
            if [ -f "apks/${PACKAGE}-${VERSION}.apk" ]; then
              SIZE=$(stat -c%s "apks/${PACKAGE}-${VERSION}.apk")
              echo "✅ Downloaded: ${SIZE} bytes ($(echo "scale=1; $SIZE/1024/1024" | bc)MB)"
            fi
          else
            # روش ۲: APKCombo به عنوان fallback
            echo "⚠️  APKPure failed, trying APKCombo..."
            curl -s "https://apkcombo.com/checkin" \
              --data "id=$PACKAGE" \
              | jq -r '.url' | xargs wget -q -O "apks/${PACKAGE}.apk"
          fi
          
      - name: Show Results
        run: |
          echo "📦 Downloaded files:"
          ls -lh apks/ 2>/dev/null || echo "❌ No files downloaded"
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "📱 Add APK: ${{ steps.extract.outputs.package }}" || echo "No changes to commit"
          git push
