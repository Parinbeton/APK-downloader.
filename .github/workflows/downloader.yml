name: Download Original Split APKs

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'لینک گوگل پلی برنامه'
        required: true
        default: 'https://play.google.com/store/apps/details?id=com.orbvpn.android'
      arch:
        description: 'معماری گوشی شما'
        required: true
        type: choice
        options:
          - 'arm64 (گوشی جدید)'
          - 'armv7 (گوشی قدیمی)'
          - 'universal (همه گوشی‌ها)'
        default: 'armv7 (گوشی قدیمی)'

jobs:
  download-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract details
        id: extract
        run: |
          URL="${{ github.event.inputs.app_url }}"
          PACKAGE=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          
          ARCH_INPUT="${{ github.event.inputs.arch }}"
          if [[ "$ARCH_INPUT" == *"armv7"* ]]; then
            echo "arch=gplay-armv7" >> $GITHUB_OUTPUT
          elif [[ "$ARCH_INPUT" == *"arm64"* ]]; then
            echo "arch=gplay-arm64" >> $GITHUB_OUTPUT
          else
            echo "arch=universal" >> $GITHUB_OUTPUT
          fi

      - name: Checkout gplay downloader
        uses: actions/checkout@v4
        with:
          repository: alltechdev/gplay-apk-downloader
          path: gplay

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            gplay/.venv
            ~/.gplay-auth.json
          key: gplay-splits-${{ runner.os }}-v1

      - name: Setup
        run: |
          cd gplay
          sudo apt-get update -qq && sudo apt-get install -y -qq apksigner openjdk-17-jre-headless zip
          if [ ! -d ".venv" ]; then
            chmod +x setup.sh && sudo ./setup.sh
          fi
          if [ ! -f ~/.gplay-auth.json ]; then
            ./gplay auth
          fi

      - name: Download Split APKs
        run: |
          mkdir -p apks
          
          cd gplay
          ARCH_TYPE="${{ steps.extract.outputs.arch }}"
          PACKAGE="${{ steps.extract.outputs.package }}"
          
          if [ "$ARCH_TYPE" = "universal" ]; then
            # دانلود هر دو معماری
            echo "Downloading ARM64..."
            ./gplay download "$PACKAGE" -a arm64 -o ../temp_arm64 || true
            
            echo "Downloading ARMv7..."
            ./gplay download "$PACKAGE" -a armv7 -o ../temp_armv7 || true
            
            cd ..
            
            # ترکیب هر دو در یک پوشه
            mkdir -p temp_all
            cp temp_arm64/* temp_all/ 2>/dev/null || true
            cp temp_armv7/* temp_all/ 2>/dev/null || true
            
            # ZIP کردن برای نصب با SAI
            zip -r "apks/${PACKAGE}-UNIVERSAL-SPLITS.zip" temp_all/
            echo "✅ Created universal split package"
            
          else
            # دانلود یک معماری
            ARCH_GPLAY=$(echo "$ARCH_TYPE" | sed 's/gplay-//')
            echo "Downloading for $ARCH_GPLAY..."
            ./gplay download "$PACKAGE" -a $ARCH_GPLAY -o ../temp_single
            
            cd ..
            
            # ZIP کردن
            zip -r "apks/${PACKAGE}-${ARCH_GPLAY}-SPLITS.zip" temp_single/
            echo "✅ Created $ARCH_GPLAY split package"
          fi
          
          # نمایش خروجی
          echo ""
          echo "Final output:"
          ls -lh apks/

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apks/
          git commit -m "📱 Split APKs: ${{ steps.extract.outputs.package }}" || echo "No changes"
          git push
