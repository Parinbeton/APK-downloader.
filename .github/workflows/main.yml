name: Download YouTube Video (With Cookies from Secret)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create cookies file from secret
        run: |
          mkdir -p workflows
          echo "${{ secrets.YOUTUBE_COOKIES }}" > workflows/cookies.txt

      - name: Install yt-dlp and ffmpeg
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download video using cookies
        run: |
          echo "Downloading: ${{ github.event.inputs.url }}"
          yt-dlp \
            --cookies workflows/cookies.txt \
            --merge-output-format mp4 \
            --output "video.mp4" \
            "${{ github.event.inputs.url }}"

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: video.mp4
          retention-days: 7

      - name: Clean up cookies file (security)
        run: rm -f workflows/cookies.txt
